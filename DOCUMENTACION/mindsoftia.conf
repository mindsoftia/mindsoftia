<VirtualHost *:80>
    ServerName mindsoftia.local
    ServerAlias *.mindsoftia.local
    DocumentRoot /var/www/html/mindsoftia/dist

    # 🛡️ 1. CABECERAS DE SEGURIDAD DEFENSIVAS (Requiere mod_headers activo)
    <IfModule mod_headers.c>
        # Previene ataques Clickjacking (Embeber la web en iFrames ocultos)
        Header always set X-Frame-Options "SAMEORIGIN"
        # Bloquea la carga de la página si detecta código XSS malicioso
        Header always set X-XSS-Protection "1; mode=block"
        # Previene que el navegador cambie el tipo MIME (MIME Sniffing)
        Header always set X-Content-Type-Options "nosniff"
        # HSTS (Sólo útil en el bloque 443, pero se puede dejar preparado)
        # Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    </IfModule>

    # Ocultar la versión exacta de Apache y el SO en las respuestas HTTP (Requiere ServerTokens Prod en conf general)
    ServerSignature Off

    <Directory /var/www/html/mindsoftia/dist>
        # 🛡️ 2. BLOQUEO DE LISTADO DE DIRECTORIOS (-Indexes)
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        # Importante para React Router: redirige todo a index.html
        FallbackResource /index.html
    </Directory>

    # Alias para la API de Laravel
    Alias /api /var/www/html/mindsoftia/backend/public

    <Directory /var/www/html/mindsoftia/backend/public>
        # 🛡️ BLOQUEO DE LISTADO DE DIRECTORIOS EN BACKEND
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        # Asegura que las rutas de Laravel funcionen correctamente
        RewriteEngine On
        RewriteBase /api
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ index.php/$1 [L]
    </Directory>

    # Evitar acceso a archivos sensibles ocultos (como .env, .git)
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/mindsoftia_error.log
    CustomLog ${APACHE_LOG_DIR}/mindsoftia_access.log combined
</VirtualHost>
